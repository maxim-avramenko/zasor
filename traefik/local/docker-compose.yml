services:

  proxy:
    image: traefik:v1.7.22-alpine
    container_name: traefik
    restart: always
    ports:
      - "80:80"
#      - "8080:8080"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik.toml:/etc/traefik/traefik.toml"
      - "traefik-tmp:/tmp"
      - "./auth/:/auth/"

volumes:
  traefik-tmp:
    external: true

